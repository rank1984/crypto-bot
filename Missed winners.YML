name: 🔍 Missed Winners Analyzer

on:
  schedule:
    - cron: '0 23 * * *'   # כל יום ב-23:00 UTC
  workflow_dispatch:
    inputs:
      min_gain:
        description: 'מינימום עלייה %'
        default: '30'
      top_n:
        description: 'כמה מטבעות לבדוק'
        default: '20'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Missed Winners Analysis
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USE_DYNAMIC_UNIVERSE: "true"
        run: |
          python tools/missed_winners.py \
            --min-gain ${{ github.event.inputs.min_gain || '30' }} \
            --top      ${{ github.event.inputs.top_n || '20' }} \
            --send
