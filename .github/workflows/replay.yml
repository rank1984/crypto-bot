name: 🏆 CRYPTO-BOT Elite — Winner Replay Engine

on:
  workflow_dispatch: # מאפשר הפעלה ידנית בלחיצת כפתור מטאב Actions בלבד

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # הוגדל ל-15 כדי למנוע חיתוך של הסריקה באמצע

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Replay Engine
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          BINANCE_API_KEY:     ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET:  ${{ secrets.BINANCE_API_SECRET }}
          SCAN_INTERVAL_SECONDS: ${{ vars.SCAN_INTERVAL_SECONDS || '300' }}
          MIN_DAILY_VOLUME:      ${{ vars.MIN_DAILY_VOLUME || '1500000' }}
          TOP_N:                 ${{ vars.TOP_N || '5' }}
          MAX_SYMBOLS:           ${{ vars.MAX_SYMBOLS || '100' }}
          MIN_PRICE:             ${{ vars.MIN_PRICE || '0.0001' }}
        run: python -m tools.replay_engine

      - name: 🔍 Debug - Find the Missing CSV
        run: |
          echo "=== Searching for ANY .csv file in the whole project ==="
          find . -name "*.csv"

      - name: 💾 Save Replay CSV Report
        uses: actions/upload-artifact@v4
        with:
          name: winner-replay-csv-data
          # מושך כל קובץ CSV שנוצר, לא משנה באיזו תיקייה הוא
          path: |
            *.csv
            **/*.csv
          if-no-files-found: warn
