name: 🏆 CRYPTO-BOT Elite — Winner Replay Engine

on:
  workflow_dispatch: # מאפשר הפעלה ידנית בלחיצת כפתור מטאב Actions בלבד

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 8 # נותן מספיק זמן לסריקה רחבה לאחור

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Replay Engine
        env:
          # העתקת משתני הסביבה כדי למנוע קריסות של רכיבי הבוט וה-Config הפנימי
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          BINANCE_API_KEY:     ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET:  ${{ secrets.BINANCE_API_SECRET }}
          
          SCAN_INTERVAL_SECONDS: ${{ vars.SCAN_INTERVAL_SECONDS }}
          MIN_DAILY_VOLUME:      ${{ vars.MIN_DAILY_VOLUME }}
          TOP_N:                 ${{ vars.TOP_N }}
          MAX_SYMBOLS:           ${{ vars.MAX_SYMBOLS }}
          MIN_PRICE:             ${{ vars.MIN_PRICE }}
          run: python -m tools.replay_engine
      - name: 💾 Save Replay CSV Report
        uses: actions/upload-artifact@v4
        with:
          name: winner-replay-csv-data
          path: tools/replay_report.csv
          if-no-files-found: ignore
