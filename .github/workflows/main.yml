name: 🚀 CRYPTO-BOT

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    
    # מעניק ל-Workflow הרשאת כתיבה כדי לעדכן את קובץ ה-CSV בתוך ה-Repository
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run bot
        env:
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --once

      - name: 🚀 Commit and Push Shadow Results
        run: |
          # הגדרת פרופיל ה-Git של השרת הווירטואלי
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # משיכת עדכונים אחרונים כדי למנוע התנגשויות (Conflicts) בין ריצות
          git pull origin main --rebase || echo "No changes to pull"
          
          # בדיקה האם הקובץ קיים והאם הוא מכיל מידע חדש
          if [ -f shadow_results.csv ]; then
            git add shadow_results.csv
            # ביצוע Commit רק אם יש שינוי אמיתי בקובץ (מונע שגיאות כשהטבלה ריקה)
            git diff --staged --quiet || git commit -m "📈 Auto-update shadow results [skip ci]"
            git push origin main
          else
            echo "shadow_results.csv not found, skipping commit."
          fi

      - name: 💾 Save Shadow Mode CSV Logs (Artifact Backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shadow-results
          path: shadow_results.csv
          if-no-files-found: warn
          retention-days: 3
